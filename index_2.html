<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Third Axis Creative</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:root{
  --bg:#0c0f12;
  --bg-2:#0f141a;
  --panel:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.10);
  --text:#ffffff;
  --muted:rgba(255,255,255,.72);
  --accent:#a8e6cf;
  --accent-2:#7fd3ff;
  --shadow:0 18px 60px rgba(0,0,0,.55);
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  scroll-behavior:smooth;
  scroll-snap-type:y mandatory;
  font-family:'Inter',Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(168,230,207,.10), transparent 55%),
    radial-gradient(900px 500px at 90% 10%, rgba(127,211,255,.09), transparent 50%),
    linear-gradient(180deg,var(--bg),var(--bg-2));
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:.5rem;
  padding:.8rem 1rem;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
nav a{
  color:var(--muted);
  text-decoration:none;
  text-transform:uppercase;
  font-size:.78rem;
  letter-spacing:1.4px;
  padding:.65rem .85rem;
  border-radius:999px;
}
nav a:hover{color:#fff;background:rgba(255,255,255,.08);}

/* SECTIONS */
header,section{
  scroll-snap-align:start;
  min-height:100vh;
  padding:5.5rem 1.5rem 4.5rem;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transform:translateY(45px);
  transition:.85s ease;
}
.visible{opacity:1;transform:none;}
.container{width:100%;max-width:1100px;margin:0 auto;}

/* TYPE */
h1,h2,h3{text-transform:uppercase;letter-spacing:1.6px;font-weight:600;}
h1{font-size:clamp(2.2rem,5vw,3.5rem);text-align:center;}
h2{font-size:clamp(1.5rem,4vw,2.4rem);color:var(--accent);margin-bottom:1.5rem;text-align:center;}
p{color:var(--muted);line-height:1.65;font-size:1.08rem;}
.lead{text-align:center;max-width:960px;margin:0 auto 1rem;font-size:1.2rem;}
.strong{color:#fff;font-weight:700;}

.hero-subline{
  display:block;
  margin-top:.35rem;
  font-size:.78em;
  font-weight:500;
  letter-spacing:1.2px;
  color:var(--muted);
}

/* HERO */
header{
  position:relative;
  text-align:center;
  overflow:hidden;
}
header::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://source.unsplash.com/1600x900/?design,abstract') center/cover no-repeat;
  filter:brightness(.65);
}
header::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.75));
}
header>*{position:relative;z-index:1;}
header img{
  max-width:320px;
  margin-bottom:1.5rem;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.55));
}
.pill-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:.6rem;
  margin-top:1.5rem;
}
.pill{
  padding:.55rem .8rem;
  border-radius:999px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.14);
  font-size:.85rem;
}

/* PANELS */
.panel{
  width:100%;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.6rem;
  box-shadow:var(--shadow);
}
.panel + .panel{margin-top:1rem;}
.panel.centered{text-align:center;}
.panel.centered .list{align-items:center;}
.panel.centered .li{justify-content:center;max-width:700px;text-align:left;}

/* LISTS */
.list{margin-top:.9rem;display:flex;flex-direction:column;gap:.65rem;}
.li{display:flex;gap:.7rem;}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  margin-top:.45rem;
}

/* EXPANDERS */
.expander{
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--radius);
  background:rgba(255,255,255,.04);
  overflow:hidden;
}
.expander + .expander{margin-top:.8rem;}
.expander-toggle{
  width:100%;
  background:none;
  border:none;
  color:#fff;
  padding:1.1rem 1.2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:1px;
}
.expander-icon{font-size:1.4rem;}
.expander.open .expander-icon{transform:rotate(45deg);}
.expander-content{
  max-height:0;
  overflow:hidden;
  padding:0 1.2rem;
  transition:max-height .4s ease;
}
.expander.open .expander-content{
  max-height:900px;
  padding:1rem 1.2rem 1.3rem;
}

/* 3D */
.models-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1.2rem;
  justify-items:center;
}
model-viewer{
  width:100%;
  max-width:420px;
  height:300px;
  border-radius:var(--radius);
  background:#000;
  border:1px solid rgba(255,255,255,.12);
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
}
.gallery img{
  width:calc(33% - 1rem);
  height:200px;
  object-fit:cover;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.12);
}
.gallery img:nth-child(3n){width:calc(66% - 1rem);}

/* FOOTER */
footer{
  padding:2rem;
  text-align:center;
  font-size:.9rem;
  color:rgba(255,255,255,.55);
}
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#endtoend">End-to-End</a>
  <a href="#digital">Digital & 3D</a>
  <a href="#showcase">3D</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<header>
  <img src="logo2.png" alt="Third Axis Creative">
  <h1>
    End-to-end production<br>
    <span class="hero-subline">For a new creative era</span>
  </h1>
  <p class="lead">
    Third Axis Creative connects <span class="strong">physical, digital, and AI-assisted</span>
    content creation into one structured production system.
  </p>
  <div class="pill-row">
    <div class="pill">Stock Flow</div>
    <div class="pill">Set Build</div>
    <div class="pill">Photography</div>
    <div class="pill">Digital & 3D</div>
    <div class="pill">AI Imagery</div>
